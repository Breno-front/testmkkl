<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Corações Animados</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f0f1a;
    overflow: hidden;
}

/* Container */
.container {
    position: relative;
    width: 100%;
    height: 100vh;
}

/* Corações */
.heart {
    position: absolute;
    bottom: -50px;
    font-size: 20px;
    color: red;
    animation: subir 5s linear infinite;
    opacity: 0.8;
}

/* Animação */
@keyframes subir {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
    }
}
</style>

</head>
<body>

<div class="container">
    <!-- vários corações -->
    <div class="heart" style="left: 10%; animation-delay: 0s;">❤️</div>
    <div class="heart" style="left: 25%; animation-delay: 1s;">💖</div>
    <div class="heart" style="left: 40%; animation-delay: 2s;">💕</div>
    <div class="heart" style="left: 55%; animation-delay: 3s;">💗</div>
    <div class="heart" style="left: 70%; animation-delay: 4s;">💘</div>
    <div class="heart" style="left: 85%; animation-delay: 2.5s;">❤️</div>
</div>

</body>
</html>
